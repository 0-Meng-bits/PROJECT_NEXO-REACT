<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Account Pending - CTU Connect</title>
<style>
  body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .card { background: #1c2333; padding: 40px; border-radius: 12px; border: 1px solid #2a3448; text-align: center; max-width: 400px; }
  .icon { font-size: 50px; margin-bottom: 20px; }
  .status-badge { background: #f7a94f; color: #0f1117; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
  h2 { margin: 15px 0; }
  p { color: #8892a4; line-height: 1.6; }
  .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #4f8ef7; color: white; text-decoration: none; border-radius: 6px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⏳</div>
    <span class="status-badge">Under Review</span>
    <h2>Almost there!</h2>
    <p>Your registration for <strong>CTU Connect</strong> has been received. Our Campus Admin is currently verifying your Student ID.</p>
    <p style="font-size: 13px;">You will gain access to the communities and hardware controls once approved.</p>
    <a href="index.html" class="btn">Back to Login</a>
  </div>

</html>
