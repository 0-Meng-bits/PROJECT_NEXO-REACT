<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>NEXO | CONNECT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-portal.js"></script>
    <link rel="stylesheet" href="user-portal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="top-nav-bar">
    <div class="user-hud">
        <div class="hud-chip">
            <span class="hud-label">USER_ID:</span>
            <span id="navIdDisplay" class="hud-value">000</span>
        </div>
        <div id="navInitials" class="hud-avatar" onclick="openProfileModal()">T</div>
    </div>
</nav>

<div class="main">
    <div class="circle-dock">
        <div class="dock-branding">
            <img src="logoo.png" class="brand-logo-small" alt="NEXO">
        </div>

        <div id="dockIcons"></div>
        <div class="dock-add-btn" onclick="openCreateModal()">+</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-brand-area">
            <h2 class="sidebar-title">NEXO <span class="cyan-text">CONNECT</span></h2>
        </div>
        <div class="nav-links">
            <div class="ls-item" id="link-home" onclick="showSection('home')">
                <i class="fa-solid fa-house-chimney nav-icon"></i>
                <span class="node-name">Home Feed</span>
            </div>

            <div class="ls-item" id="link-requests" onclick="showSection('requests')">
                <i class="fa-solid fa-tower-broadcast nav-icon"></i>
                <span class="node-name">Activity Hub</span>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="c-feed" id="feedList"></div>
        
        <div id="requestsView" style="display:none; padding:25px; flex:1; overflow-y:auto;"></div>

        <div class="composer" id="composerArea">
            <div class="c-input-wrap">
                <input id="compTxt" placeholder="Write a message..."/>
                <button class="cyber-btn" onclick="sendPost()">SEND</button>
            </div>
        </div>
    </div>
</div>

<div id="createModal">
    <div class="post" style="width:400px; border:1px solid var(--cyber-cyan); box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);">
        <h3 style="color:var(--cyber-cyan); margin-bottom:20px; font-size:14px; letter-spacing:2px; text-transform: uppercase;">Initialize_New_Node</h3>
        
        <label style="font-size:10px; color:var(--text-muted); display:block; margin-bottom:5px;">NODE_NAME</label>
        <input id="newCircleName" placeholder="e.g. BSIT 3A Team" style="width:100%; background:#000; border:1px solid #333; padding:12px; color:white; border-radius:6px; margin-bottom:15px; outline:none; font-family:inherit;">
        
        <label style="font-size:10px; color:var(--text-muted); display:block; margin-bottom:5px;">CLASSIFICATION</label>
        <select id="newCircleType" style="width:100%; background:#000; border:1px solid #333; padding:12px; color:var(--cyber-yellow); border-radius:6px; margin-bottom:15px; outline:none; font-family:inherit; cursor:pointer;">
            <option value="academic">Academic / Study Group</option>
            <option value="project">Special Project / Capstone</option>
            <option value="hobby">Hobby / Interest</option>
            <option value="social">Social / Hangout</option>
        </select>

        <label style="font-size:10px; color:var(--text-muted); display:block; margin-bottom:5px;">TRANSMISSION_GOAL</label>
        <textarea id="newCircleDesc" placeholder="Briefly describe this node's purpose..." style="width:100%; background:#000; border:1px solid #333; padding:12px; color:white; border-radius:6px; margin-bottom:20px; outline:none; height:80px; resize:none; font-family:inherit;"></textarea>
        
        <div style="display:flex; gap:10px;">
            <button class="cyber-btn" onclick="submitCircle()" style="flex:1;">CREATE_NODE</button>
            <button class="cyber-btn" onclick="closeModal()" style="flex:1; background:#222; color:var(--text-muted);">ABORT</button>
        </div>
    </div>
</div>

<div id="managePanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(10px);">
    <div class="post" style="width:600px; border:1px solid var(--cyber-yellow);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--cyber-yellow); font-size:18px;">GROUP SETTINGS</h2>
            <button onclick="closeManagePanel()" style="background:transparent; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>
        </div>

        <table style="width:100%; color:var(--text-muted); font-size:13px; border-collapse:collapse;">
            <thead>
                <tr style="border-bottom:1px solid #333; text-align:left;">
                    <th style="padding:10px;">STUDENT NAME</th>
                    <th style="padding:10px;">CURRENT ROLE</th>
                    <th style="padding:10px;">ACTION</th>
                </tr>
            </thead>
            <tbody id="memberList">
                <tr>
                    <td style="padding:10px; color:white;">Juan Dela Cruz</td>
                    <td style="padding:10px;"><span style="color:var(--cyber-cyan)">Member</span></td>
                    <td style="padding:10px;">
                        <select class="cyber-btn" style="background:#222; color:white; text-transform:none;">
                            <option>Promote to Co-Leader</option>
                            <option style="color:red;">Kick from Group</option>
                        </select>
                    </td>
                </tr>
            </tbody>
        </table>
        <button class="cyber-btn" style="width:100%; margin-top:20px;" onclick="toast('Settings Saved')">SAVE CHANGES</button>
    </div>
</div>

<div id="toast">SYSTEM_UPDATE_SUCCESSFUL</div>


<div id="profileModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#0a0a0a; border:1px solid var(--cyber-cyan); padding:30px; border-radius:12px; min-width:300px; box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);">
        <div id="profileModalBody"></div>
    </div>
</div>
</body>
</html>
