<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO | System Access</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="logo-text">NEXO<span>CONNECT</span></h1>
                <p id="authSubtitle">INITIALIZING_SECURE_SESSION...</p>
            </div>

            <form id="authForm">
                <div class="input-group">
                    <label for="authEmail">CTU_ID</label>
                    <input type="text" id="authEmail" placeholder="e.g. 2024-CTU-DB-001" required>
                </div>

                <div id="registrationFields" class="hidden">
                    <div class="input-group">
                        <label for="regName">FULL_NAME</label>
                        <input type="text" id="regName" placeholder="Juan Dela Cruz">
                    </div>
                    <div class="input-group">
                        <label for="regEmail">CTU_EMAIL</label>
                        <input type="email" id="regEmail" placeholder="name@ctu.edu.ph">
                    </div>
                    <div class="input-group">
                        <label for="regUserType">USER_TYPE</label>
                        <select id="regUserType" class="cyber-select" title="Select account type">
                            <option value="Student">STUDENT</option>
                            <option value="Faculty">FACULTY</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="authPass">PASSWORD</label>
                    <input type="password" id="authPass" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submitBtn" class="cyber-btn">LOGIN</button>
            </form>

            <div class="auth-footer">
                <p id="toggleText">New student? <a href="#" onclick="toggleAuth(event)">Create an Account</a></p>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
